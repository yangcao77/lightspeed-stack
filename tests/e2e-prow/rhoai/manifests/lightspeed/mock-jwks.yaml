apiVersion: v1
kind: Pod
metadata:
  name: mock-jwks
  labels:
    app: mock-jwks
spec:
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: mock-jwks
      image: python:3.12-slim
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      command: ["python", "/app/server.py"]
      ports:
        - containerPort: 8000
      volumeMounts:
        - name: server-script
          mountPath: /app/server.py
          subPath: server.py
      readinessProbe:
        httpGet:
          path: /health
          port: 8000
        initialDelaySeconds: 2
        periodSeconds: 5
      livenessProbe:
        httpGet:
          path: /health
          port: 8000
        initialDelaySeconds: 5
        periodSeconds: 10
  volumes:
    - name: server-script
      configMap:
        name: mock-jwks-script
---
apiVersion: v1
kind: Service
metadata:
  name: mock-jwks
spec:
  selector:
    app: mock-jwks
  ports:
    - port: 8000
      targetPort: 8000
