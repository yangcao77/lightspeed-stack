apiVersion: v1
kind: Pod
metadata:
  name: mock-mcp
  labels:
    app: mock-mcp
spec:
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: mock-mcp
      image: python:3.12-slim
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      command: ["python", "/app/server.py"]
      ports:
        - containerPort: 3000
      volumeMounts:
        - name: server-script
          mountPath: /app/server.py
          subPath: server.py
      readinessProbe:
        httpGet:
          path: /health
          port: 3000
        initialDelaySeconds: 5
        periodSeconds: 5
      livenessProbe:
        httpGet:
          path: /health
          port: 3000
        initialDelaySeconds: 10
        periodSeconds: 10
  volumes:
    - name: server-script
      configMap:
        name: mock-mcp-script
---
apiVersion: v1
kind: Service
metadata:
  name: mock-mcp
spec:
  selector:
    app: mock-mcp
  ports:
    - port: 3000
      targetPort: 3000
