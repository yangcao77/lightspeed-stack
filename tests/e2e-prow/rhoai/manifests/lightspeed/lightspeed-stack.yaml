apiVersion: v1
kind: Pod
metadata:
  name: lightspeed-stack-service
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: lightspeed-stack-container
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: E2E_LLAMA_HOSTNAME
          valueFrom:
            secretKeyRef:
              name: llama-stack-ip-secret
              key: key
        - name: FAISS_VECTOR_STORE_ID
          valueFrom:
            secretKeyRef:
              name: faiss-vector-store-secret
              key: id
              optional: true
        - name: KV_RAG_PATH
          value: "/app-root/src/.llama/storage/rag/kv_store.db"
      image: ${LIGHTSPEED_STACK_IMAGE}
      ports:
        - containerPort: 8080
      # TCP probes avoid HTTP/auth. LCS + Llama handshake and large images can take 60–120s before :8080 listens;
      # aggressive liveness was killing the container (connection refused) and breaking port-forward sandboxes.
      readinessProbe:
        tcpSocket:
          port: 8080
        initialDelaySeconds: 20
        periodSeconds: 5
        failureThreshold: 30
      livenessProbe:
        tcpSocket:
          port: 8080
        initialDelaySeconds: 120
        periodSeconds: 15
        failureThreshold: 3
      volumeMounts:
        - name: config
          mountPath: /app-root/lightspeed-stack.yaml
          subPath: lightspeed-stack.yaml
        # MCPFileAuth E2E: same path as docker-compose (tests/e2e/secrets/mcp-token → secret mcp-file-auth-token)
        - name: mcp-file-auth-token
          mountPath: /tmp/mcp-secret-token
          subPath: token
          readOnly: true
        # InvalidMCPFileAuthConfig E2E: docker-compose mounts tests/e2e/secrets/invalid-mcp-token here
        - name: mcp-invalid-file-auth-token
          mountPath: /tmp/invalid-mcp-token
          subPath: token
          readOnly: true
  volumes:
    - name: config
      configMap:
        name: lightspeed-stack-config
    - name: mcp-file-auth-token
      secret:
        secretName: mcp-file-auth-token
    - name: mcp-invalid-file-auth-token
      secret:
        secretName: mcp-invalid-file-auth-token
