# Prow/OpenShift: cluster DNS + MCP mock service (port 3000). Do not use docker names (llama-stack, mock-mcp:3001).
name: Lightspeed Core Service (LCS)
service:
  host: 0.0.0.0
  port: 8080
  auth_enabled: false
  workers: 1
  color_log: true
  access_log: true
llama_stack:
  use_as_library_client: false
  url: http://${env.E2E_LLAMA_HOSTNAME}:8321
  api_key: xyzzy
user_data_collection:
  feedback_enabled: true
  feedback_storage: "/tmp/data/feedback"
  transcripts_enabled: true
  transcripts_storage: "/tmp/data/transcripts"
conversation_cache:
  type: "sqlite"
  sqlite:
    db_path: "/tmp/data/conversation-cache.db"
authentication:
  module: "noop"
mcp_servers:
  - name: "mcp-oauth"
    provider_id: "model-context-protocol"
    url: "http://mcp-mock-server:3000"
    authorization_headers:
      Authorization: "oauth"
