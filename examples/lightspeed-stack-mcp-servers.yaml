name: Lightspeed Core Service (LCS)
service:
  host: localhost
  port: 8080
  auth_enabled: false
  workers: 1
  color_log: true
  access_log: true
llama_stack:
  use_as_library_client: false
  url: http://localhost:8321
  api_key: xyzzy
user_data_collection:
  feedback_enabled: true
  feedback_storage: "/tmp/data/feedback"
  transcripts_enabled: true
  transcripts_storage: "/tmp/data/transcripts"
authentication:
  module: "noop"
mcp_servers:
  - name: "server1"
    provider_id: "provider1"
    url: "http://url.com:1"
  - name: "server2"
    provider_id: "provider2"
    url: "http://url.com:2"
  - name: "server3"
    provider_id: "provider3"
    url: "http://url.com:3"
  # Example with authorization headers using secret file paths
  - name: "server-with-secret-auth"
    provider_id: "provider4"
    url: "http://url.com:4"
    authorization_headers:
      Authorization: "/var/secrets/auth-token"  # Path to file containing auth token
      X-API-Key: "/var/secrets/api-key"         # Path to file containing API key
  # Example with kubernetes token (special case)
  - name: "server-with-k8s-auth"
    provider_id: "provider5"
    url: "http://url.com:5"
    authorization_headers:
      Authorization: "kubernetes"  # Special value to use kubernetes service account token
  # Example with client-provided token (special case)
  - name: "server-with-client-auth"
    provider_id: "provider6"
    url: "http://url.com:6"
    authorization_headers:
      Authorization: "client"  # Special value to forward the client's token
    timeout: 30  # Optional: timeout in seconds (future Llama Stack feature)
  # Example with automatic header propagation from incoming request (HCC use case)
  # Headers listed here are automatically extracted from the incoming HTTP request
  # and forwarded to this MCP server. Useful when infrastructure components (e.g.
  # HCC Gateway) inject headers that MCP servers need for user identification.
  - name: "rbac"
    url: "http://rbac-service:8080"
    headers:
      - x-rh-identity
      - x-rh-insights-request-id
  # Headers can be combined with authorization_headers (additive)
  - name: "notifications"
    url: "http://notifications-service:8080"
    headers:
      - x-rh-identity
    authorization_headers:
      X-API-Key: "/var/secrets/notifications-api-key"